name: Update Platform Stats

on:
  schedule:
    # Runs at 00:00 UTC every Sunday (Weekly)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Find all requirements.txt files and install them
          find . -name "requirements.txt" -exec pip install -r {} \;

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Run Master Updater
        env:
          # Prevents Python from creating __pycache__ folders
          PYTHONDONTWRITEBYTECODE: 1
          # Optional: Use a Personal Access Token to avoid GitHub API rate limits
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for linkedin-updater
          LINKEDIN_USERNAME: ${{ secrets.LINKEDIN_USERNAME }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: |
          python run_all.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add all generated output and log files
          git add .
          
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update profile stats" && git push)
